name: doctor_booking_app
description: Doctor Booking - Ứng dụng đặt lịch khám bệnh thông minh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase (Cơ sở dữ liệu chính)
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  auto_route: ^9.2.2

  # UI/UX
  flex_color_scheme: ^8.1.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10
  flutter_animate: ^4.5.2
  lottie: ^3.1.3
  skeletonizer: ^1.4.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Calendar & Booking
  table_calendar: ^3.1.2
  add_2_calendar: ^3.0.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Network & Connectivity
  connectivity_plus: ^6.1.0
  http: ^1.2.2

  # Secure Storage
  flutter_secure_storage: ^9.2.3

  # Video Call (Telemedicine)
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  # Payment
  webview_flutter: ^4.10.0

  # Charts (Analytics)
  fl_chart: ^0.69.0

  # Push Notifications (FCM only - KHÔNG dùng Firebase DB)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  iconsax_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  auto_route_generator: ^9.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/svg/
    - assets/images/
    - assets/lottie/

  # Fonts loaded via google_fonts package (no local files needed)
  # To add custom local fonts later, uncomment and add files:
  # fonts:
  #   - family: Gelion
  #     fonts:
  #       - asset: assets/fonts/Gelion-Regular.ttf
